<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Henosis Studio — Giriş</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #2C2D32;
    color: #DCDCD6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image:
      radial-gradient(ellipse at 15% 10%, rgba(131,100,107,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 90%, rgba(160,166,180,0.07) 0%, transparent 50%);
  }
  .card {
    width: 100%;
    max-width: 400px;
    padding: 40px 36px;
    background: #363740;
    border-radius: 20px;
    border: 1px solid #50515C;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .logo-box {
    width: 38px; height: 38px;
    background: #83646B;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-box svg { display: block; }
  .brand { font-size: 16px; font-weight: 700; color: #DCDCD6; }
  .brand-sub { font-size: 10px; color: #A0A6B4; margin-top: 1px; letter-spacing: 0.5px; }

  .tabs {
    display: flex;
    gap: 0;
    background: #424349;
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 28px;
  }
  .tab-btn {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.18s;
    background: transparent;
    color: #A0A6B4;
  }
  .tab-btn.active {
    background: #363740;
    color: #C8B4AB;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #A0A6B4;
    margin-bottom: 6px;
    letter-spacing: 0.4px;
  }
  input {
    width: 100%;
    padding: 11px 14px;
    background: #424349;
    border: 1.5px solid transparent;
    border-radius: 10px;
    color: #DCDCD6;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: all 0.2s;
    margin-bottom: 16px;
  }
  input:focus { border-color: #83646B; background: #4A4B54; }
  input::placeholder { color: #686A78; }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: #83646B;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .btn-primary:hover { background: #6D5059; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .msg {
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 9px;
    font-size: 12px;
    line-height: 1.5;
    display: none;
  }
  .msg.error { background: rgba(201,80,80,0.1); border: 1px solid rgba(201,80,80,0.3); color: #C95050; display: block; }
  .msg.success { background: rgba(74,175,122,0.1); border: 1px solid rgba(74,175,122,0.3); color: #4AAF7A; display: block; }

  .divider {
    text-align: center;
    font-size: 10px;
    color: #686A78;
    margin: 20px 0;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 42%;
    height: 1px;
    background: #50515C;
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }

  .footer-note {
    margin-top: 24px;
    font-size: 10px;
    color: #686A78;
    text-align: center;
    line-height: 1.6;
  }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <div class="logo-box">
      <svg width="22" height="22" viewBox="0 0 48 48" fill="none">
        <path d="M23,7 C15,5 7,10 6,19 C5,28 10,38 18,42 C25,45 34,42 38,35 C42,28 41,17 36,11 C32,6 29,8 23,7 Z" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.8"/>
        <path d="M34,11 C28,8 21,12 19,20 C17,28 20,38 28,42 C35,45 43,40 45,32 C47,24 44,14 39,10 C36,8 37,13 34,11 Z" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1.4"/>
      </svg>
    </div>
    <div>
      <div class="brand">Henosis Studio</div>
      <div class="brand-sub">AI Görsel Üretim Platformu</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Giriş Yap</button>
    <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Kayıt Ol</button>
  </div>

  <!-- Giriş formu -->
  <div id="form-login">
    <label>E-POSTA</label>
    <input type="email" id="login-email" placeholder="ornek@mail.com" autocomplete="email">
    <label>ŞİFRE</label>
    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    <button class="btn-primary" id="btn-login" onclick="doLogin()">Giriş Yap</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <!-- Kayıt formu -->
  <div id="form-register" style="display:none">
    <label>E-POSTA</label>
    <input type="email" id="reg-email" placeholder="ornek@mail.com" autocomplete="email">
    <label>ŞİFRE</label>
    <input type="password" id="reg-password" placeholder="En az 8 karakter" autocomplete="new-password">
    <label>ŞİFRE TEKRAR</label>
    <input type="password" id="reg-password2" placeholder="••••••••" autocomplete="new-password">
    <button class="btn-primary" id="btn-register" onclick="doRegister()">Kayıt Ol</button>
    <div class="msg" id="register-msg"></div>
  </div>

  <div class="footer-note">
    Kendi Fal.ai ve Anthropic API anahtarlarınla çalışır.<br>
    Henosis ücretli API çağrılarını senin adına yapmaz.
  </div>
</div>

<script>
  // ── Supabase başlat ──
  const SUPABASE_URL  = 'https://ekvsjeqcjqrlubpzrjbf.supabase.co';  // ← anon key'i de değiştir
  const SUPABASE_ANON = 'BURAYA_ANON_KEY_YAPISTIR';  // Settings → API → anon/public (eyJ... ile başlar)
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // Zaten giriş yapılmışsa direkt yönlendir
  (async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      localStorage.setItem('hns_token', session.access_token);
      localStorage.setItem('hns_refresh', session.refresh_token);
      window.location.href = '/';
    }
  })();

  function switchTab(t) {
    document.getElementById('tab-login').classList.toggle('active', t === 'login');
    document.getElementById('tab-register').classList.toggle('active', t === 'register');
    document.getElementById('form-login').style.display    = t === 'login'    ? '' : 'none';
    document.getElementById('form-register').style.display = t === 'register' ? '' : 'none';
  }

  function setMsg(id, type, text) {
    const el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.textContent = text;
  }
  function clearMsg(id) {
    const el = document.getElementById(id);
    el.className = 'msg';
    el.textContent = '';
  }
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading
      ? '<span class="spinner"></span>Lütfen bekleyin...'
      : (btnId === 'btn-login' ? 'Giriş Yap' : 'Kayıt Ol');
  }

  async function doLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) return setMsg('login-msg', 'error', 'E-posta ve şifre gerekli.');
    clearMsg('login-msg');
    setLoading('btn-login', true);
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    setLoading('btn-login', false);
    if (error) return setMsg('login-msg', 'error', error.message);
    localStorage.setItem('hns_token', data.session.access_token);
    localStorage.setItem('hns_refresh', data.session.refresh_token);
    window.location.href = '/';
  }

  async function doRegister() {
    const email = document.getElementById('reg-email').value.trim();
    const pass1  = document.getElementById('reg-password').value;
    const pass2  = document.getElementById('reg-password2').value;
    if (!email || !pass1) return setMsg('register-msg', 'error', 'Tüm alanlar zorunlu.');
    if (pass1 !== pass2)  return setMsg('register-msg', 'error', 'Şifreler eşleşmiyor.');
    if (pass1.length < 8) return setMsg('register-msg', 'error', 'Şifre en az 8 karakter olmalı.');
    clearMsg('register-msg');
    setLoading('btn-register', true);
    const { data, error } = await supabase.auth.signUp({ email, password: pass1 });
    setLoading('btn-register', false);
    if (error) return setMsg('register-msg', 'error', error.message);
    if (data.session) {
      localStorage.setItem('hns_token', data.session.access_token);
      localStorage.setItem('hns_refresh', data.session.refresh_token);
      window.location.href = '/';
    } else {
      setMsg('register-msg', 'success', 'Kayıt başarılı! E-postana gelen onay linkine tıkla, ardından giriş yap.');
      switchTab('login');
    }
  }

  // Enter tuşu desteği
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const active = document.getElementById('form-login').style.display !== 'none';
    if (active) doLogin(); else doRegister();
  });
</script>
</body>
</html>
