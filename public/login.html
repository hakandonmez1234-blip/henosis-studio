<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#F5F1EB">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<title>Henosis Studio — Giriş</title>
<script src="https://unpkg.com/@supabase/supabase-js@2.47.10/dist/umd/supabase.js"></script>
<style>
  :root {
    --bg-main: #F5F1EB;
    --bg-cream: #FDF9F3;
    --bg-card: #FFFFFF;
    --bg-elev: #EDE8E0;
    --brd: #D8D3CC;
    --brd-soft: #E8E3DC;
    --tx-main: #2C2419;
    --tx-muted: #6B6255;
    --tx-dim: #9A8F82;
    --accent: #D4704A;
    --accent-light: #E09070;
    --ac-orange: #C95050;
    --rad-md: 14px;
    --rad-lg: 18px;
    --shadow-soft: 0 2px 8px rgba(44,36,25,0.06);
    --shadow-float: 0 8px 24px rgba(44,36,25,0.12);
    --shadow-depth: 0 16px 48px rgba(44,36,25,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-main);
    color: var(--tx-main);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    padding: 40px 36px;
    background: var(--bg-card);
    border-radius: var(--rad-lg);
    border: 1px solid var(--brd);
    box-shadow: var(--shadow-depth);
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 32px;
  }
  
  .logo-box {
    width: 48px; height: 48px;
    background: var(--tx-main);
    border-radius: var(--rad-md);
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-float);
  }
  
  .logo-box svg { display: block; }
  
  .brand { 
    font-family: 'Playfair Display', serif;
    font-size: 22px; 
    font-weight: 700; 
    color: var(--tx-main);
    letter-spacing: -0.3px;
  }
  
  .brand-sub { 
    font-size: 12px; 
    color: var(--tx-muted); 
    margin-top: 3px; 
    letter-spacing: 0.5px; 
  }

  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-elev);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 28px;
    border: 1px solid var(--brd-soft);
  }
  
  .tab-btn {
    flex: 1;
    padding: 12px 16px;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.25s ease;
    background: transparent;
    color: var(--tx-muted);
  }
  
  .tab-btn:hover {
    color: var(--tx-main);
    background: rgba(255,255,255,0.6);
  }
  
  .tab-btn.active {
    background: var(--bg-card);
    color: var(--tx-main);
    box-shadow: var(--shadow-soft);
    font-weight: 700;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--tx-muted);
    margin-bottom: 8px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  
  input {
    width: 100%;
    padding: 14px 16px;
    background: var(--bg-cream);
    border: 1.5px solid var(--brd);
    border-radius: var(--rad-md);
    color: var(--tx-main);
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: all 0.25s ease;
    margin-bottom: 18px;
  }
  
  input:focus { 
    border-color: var(--accent); 
    background: var(--bg-card);
    box-shadow: 0 0 0 3px rgba(212,112,74,0.1);
  }
  
  input::placeholder { color: var(--tx-dim); }

  .btn-primary {
    width: 100%;
    padding: 16px;
    background: var(--tx-main);
    color: var(--bg-card);
    border: none;
    border-radius: var(--rad-md);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.25s ease;
    margin-top: 8px;
    box-shadow: var(--shadow-float);
  }
  
  .btn-primary:hover { 
    background: var(--accent);
    transform: translateY(-2px);
    box-shadow: var(--shadow-depth);
  }
  
  .btn-primary:disabled { 
    opacity: 0.5; 
    cursor: not-allowed; 
    transform: none;
  }

  .msg {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: var(--rad-md);
    font-size: 13px;
    line-height: 1.5;
    display: none;
    font-weight: 500;
  }
  
  .msg.error { 
    background: rgba(201,80,80,0.08); 
    border: 1px solid rgba(201,80,80,0.2); 
    color: var(--ac-orange); 
    display: block; 
  }
  
  .msg.success { 
    background: rgba(74,175,122,0.08); 
    border: 1px solid rgba(74,175,122,0.2); 
    color: #4A8A5A; 
    display: block; 
  }

  .footer-note {
    margin-top: 28px;
    font-size: 12px;
    color: var(--tx-dim);
    text-align: center;
    line-height: 1.6;
  }
  
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: var(--bg-card);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 10px;
  }
  
  @keyframes spin { to { transform: rotate(360deg); } }

  .forgot-link {
    display: block;
    text-align: right;
    font-size: 12px;
    color: var(--tx-muted);
    margin-top: -12px;
    margin-bottom: 16px;
    cursor: pointer;
    transition: color 0.2s;
  }
  
  .forgot-link:hover {
    color: var(--accent);
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <div class="logo-box">
      <svg width="26" height="26" viewBox="0 0 48 48" fill="none">
        <path d="M23,7 C15,5 7,10 6,19 C5,28 10,38 18,42 C25,45 34,42 38,35 C42,28 41,17 36,11 C32,6 29,8 23,7 Z" fill="none" stroke="#F5F1EB" stroke-width="2"/>
        <path d="M34,11 C28,8 21,12 19,20 C17,28 20,38 28,42 C35,45 43,40 45,32 C47,24 44,14 39,10 C36,8 37,13 34,11 Z" fill="none" stroke="#F5F1EB" stroke-width="1.5"/>
      </svg>
    </div>
    <div>
      <div class="brand">Henosis Studio</div>
      <div class="brand-sub">AI Görsel Üretim Platformu</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-login">Giriş Yap</button>
    <button class="tab-btn" id="tab-register">Kayıt Ol</button>
  </div>

  <div id="form-login">
    <label>E-Posta</label>
    <input type="email" id="login-email" placeholder="ornek@mail.com" autocomplete="email">
    <label>Şifre</label>
    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    <span class="forgot-link" id="forgot-link">Şifremi unuttum</span>
    <button class="btn-primary" id="btn-login">Giriş Yap</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <div id="form-register" style="display:none">
    <label>E-Posta</label>
    <input type="email" id="reg-email" placeholder="ornek@mail.com" autocomplete="email">
    <label>Şifre</label>
    <input type="password" id="reg-password" placeholder="En az 8 karakter" autocomplete="new-password">
    <label>Şifre Tekrar</label>
    <input type="password" id="reg-password2" placeholder="••••••••" autocomplete="new-password">
    <button class="btn-primary" id="btn-register">Kayıt Ol</button>
    <div class="msg" id="register-msg"></div>
  </div>

  <div class="footer-note">
    Kendi API anahtarlarınla çalışır.<br>
    Verilerin Supabase hesabında güvenle saklanır.
  </div>
</div>

<script>
  // Supabase bağlantısı
  const SUPABASE_URL  = 'https://ekvsjeqcjqrlubpzrjbf.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVrdnNqZXFjanFybHVicHpyamJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MzQ5MDAsImV4cCI6MjA5MTAxMDkwMH0.Gvz3k9Jx2lUgFJgueibQcG_RU7H5gIBgp5Rau2lASoo';
  
  let supabase;
  
  try {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    console.log('✅ Supabase bağlantısı kuruldu');
  } catch (e) {
    console.error('❌ Supabase hatası:', e);
    showMsg('login-msg', 'error', 'Bağlantı hatası. Sayfayı yenileyin.');
  }

  // DOM elementleri
  const tabLogin = document.getElementById('tab-login');
  const tabRegister = document.getElementById('tab-register');
  const formLogin = document.getElementById('form-login');
  const formRegister = document.getElementById('form-register');
  const btnLogin = document.getElementById('btn-login');
  const btnRegister = document.getElementById('btn-register');
  const forgotLink = document.getElementById('forgot-link');

  // Event listener'lar
  tabLogin.addEventListener('click', () => switchTab('login'));
  tabRegister.addEventListener('click', () => switchTab('register'));
  btnLogin.addEventListener('click', doLogin);
  btnRegister.addEventListener('click', doRegister);
  forgotLink.addEventListener('click', resetPassword);

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const isLogin = formLogin.style.display !== 'none';
    if (isLogin) doLogin(); else doRegister();
  });

  (async () => {
    if (!supabase) return;
    try {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        localStorage.setItem('hns_token', session.access_token);
        localStorage.setItem('hns_refresh', session.refresh_token);
        localStorage.setItem('hns_user', JSON.stringify(session.user));
        window.location.href = '/';
      }
    } catch (e) {
      console.error('Session kontrolü hatası:', e);
    }
  })();

  function switchTab(tab) {
    const isLogin = tab === 'login';
    
    tabLogin.classList.toggle('active', isLogin);
    tabRegister.classList.toggle('active', !isLogin);
    formLogin.style.display = isLogin ? 'block' : 'none';
    formRegister.style.display = isLogin ? 'none' : 'block';
    
    clearMsg('login-msg');
    clearMsg('register-msg');
  }

  function showMsg(id, type, text) {
    const el = document.getElementById(id);
    el.className = 'msg ' + type;
    el.textContent = text;
  }

  function clearMsg(id) {
    const el = document.getElementById(id);
    el.className = 'msg';
    el.textContent = '';
  }

  function setLoading(btnId, isLoading, originalText) {
    const btn = document.getElementById(btnId);
    btn.disabled = isLoading;
    if (isLoading) {
      btn.innerHTML = '<span class="spinner"></span> Lütfen bekleyin...';
    } else {
      btn.textContent = originalText;
    }
  }

  async function doLogin() {
    if (!supabase) {
      showMsg('login-msg', 'error', 'Bağlantı hatası. Sayfayı yenileyin.');
      return;
    }

    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    if (!email || !password) {
      showMsg('login-msg', 'error', 'E-posta ve şifre gerekli.');
      return;
    }

    clearMsg('login-msg');
    setLoading('btn-login', true, 'Giriş Yap');

    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      
      if (error) {
        let msg = error.message;
        if (error.message.includes('Invalid login')) msg = 'E-posta veya şifre hatalı.';
        if (error.message.includes('Email not confirmed')) msg = 'E-posta henüz onaylanmamış. Spam klasörünü kontrol edin.';
        showMsg('login-msg', 'error', msg);
        setLoading('btn-login', false, 'Giriş Yap');
        return;
      }

      // Kullanıcı onay durumunu kontrol et
      const userId = data.user.id;
      const { data: approvalData, error: approvalError } = await supabase
        .from('user_approvals')
        .select('status')
        .eq('user_id', userId)
        .single();

      if (approvalError || !approvalData) {
        // Onay kaydı yok - pending olarak oluştur
        await supabase.from('user_approvals').insert([{
          user_id: userId,
          email: email,
          status: 'pending',
          created_at: new Date().toISOString()
        }]);
        showMsg('login-msg', 'error', 'Hesabınız admin onayı bekliyor. Lütfen daha sonra tekrar deneyin.');
        setLoading('btn-login', false, 'Giriş Yap');
        return;
      }

      if (approvalData.status === 'pending') {
        showMsg('login-msg', 'error', 'Hesabınız henüz onaylanmadı. Admin onayı bekleniyor.');
        setLoading('btn-login', false, 'Giriş Yap');
        return;
      }

      if (approvalData.status === 'rejected') {
        showMsg('login-msg', 'error', 'Hesabınız reddedildi. Erişim izniniz yok.');
        setLoading('btn-login', false, 'Giriş Yap');
        return;
      }

      // Onaylı kullanıcı - giriş yap
      localStorage.setItem('hns_token', data.session.access_token);
      localStorage.setItem('hns_refresh', data.session.refresh_token);
      localStorage.setItem('hns_user', JSON.stringify(data.user));
      localStorage.setItem('hns_approved', 'true');
      window.location.href = '/';
    } catch (e) {
      console.error('Login hatası:', e);
      showMsg('login-msg', 'error', 'Bir hata oluştu. Tekrar deneyin.');
      setLoading('btn-login', false, 'Giriş Yap');
    }
  }

  async function doRegister() {
    if (!supabase) {
      showMsg('register-msg', 'error', 'Bağlantı hatası. Sayfayı yenileyin.');
      return;
    }

    const email = document.getElementById('reg-email').value.trim();
    const pass1 = document.getElementById('reg-password').value;
    const pass2 = document.getElementById('reg-password2').value;

    if (!email || !pass1) {
      showMsg('register-msg', 'error', 'Tüm alanlar zorunlu.');
      return;
    }
    
    if (pass1 !== pass2) {
      showMsg('register-msg', 'error', 'Şifreler eşleşmiyor.');
      return;
    }
    
    if (pass1.length < 8) {
      showMsg('register-msg', 'error', 'Şifre en az 8 karakter olmalı.');
      return;
    }

    clearMsg('register-msg');
    setLoading('btn-register', true, 'Kayıt Ol');

    try {
      const { data, error } = await supabase.auth.signUp({ 
        email, 
        password: pass1,
        options: {
          emailRedirectTo: window.location.origin + '/login.html'
        }
      });

      if (error) {
        showMsg('register-msg', 'error', error.message);
        setLoading('btn-register', false, 'Kayıt Ol');
        return;
      }

      // Kullanıcı onay kaydı oluştur (pending)
      if (data.user) {
        await supabase.from('user_approvals').insert([{
          user_id: data.user.id,
          email: email,
          status: 'pending',
          created_at: new Date().toISOString()
        }]);
      }

      if (data.session) {
        localStorage.setItem('hns_token', data.session.access_token);
        localStorage.setItem('hns_refresh', data.session.refresh_token);
        localStorage.setItem('hns_user', JSON.stringify(data.user));
        window.location.href = '/';
      } else {
        showMsg('register-msg', 'success', '✓ Kayıt başarılı! E-posta onayından sonra admin onayı bekleyeceksiniz. Onaylandığında giriş yapabilirsiniz.');
        setLoading('btn-register', false, 'Kayıt Ol');
      }
    } catch (e) {
      console.error('Kayıt hatası:', e);
      showMsg('register-msg', 'error', 'Bir hata oluştu. Tekrar deneyin.');
      setLoading('btn-register', false, 'Kayıt Ol');
    }
  }

  async function resetPassword() {
    if (!supabase) {
      showMsg('login-msg', 'error', 'Bağlantı hatası. Sayfayı yenileyin.');
      return;
    }

    const email = document.getElementById('login-email').value.trim();
    if (!email) {
      showMsg('login-msg', 'error', 'Lütfen e-posta adresinizi girin.');
      return;
    }

    setLoading('btn-login', true, 'Giriş Yap');
    
    try {
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/login.html'
      });
      
      if (error) {
        showMsg('login-msg', 'error', error.message);
      } else {
        showMsg('login-msg', 'success', 'Şifre sıfırlama linki gönderildi! E-postanızı kontrol edin.');
      }
    } catch (e) {
      showMsg('login-msg', 'error', 'Bir hata oluştu. Tekrar deneyin.');
    }
    
    setLoading('btn-login', false, 'Giriş Yap');
  }
</script>
</body>
</html>
