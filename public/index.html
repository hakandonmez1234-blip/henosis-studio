<script>
  // Supabase auth + otomatik token yenileme
  (function(){
    const SUPABASE_URL  = 'https://ekvsjeqcjqrlubpzrjbf.supabase.co';  // ← anon key'i de değiştir
    const SUPABASE_ANON = 'BURAYA_ANON_KEY_YAPISTIR';  // Settings → API → anon/public (eyJ... ile başlar)
    if(SUPABASE_URL.includes('__')){
      // Placeholder henüz değiştirilmemiş — local dev modunda devam et
      if(!S.t2vMdl)S.t2vMdl="kling25t";
      initApp();
      return;
    }
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    // Token yenileme dinleyici
    sb.auth.onAuthStateChange((event, session) => {
      if(event === 'TOKEN_REFRESHED' && session){
        localStorage.setItem('hns_token', session.access_token);
        localStorage.setItem('hns_refresh', session.refresh_token);
      }
      if(event === 'SIGNED_OUT'){
        localStorage.removeItem('hns_token');
        localStorage.removeItem('hns_refresh');
        window.location.href = '/login.html';
      }
    });
    // Refresh token ile oturumu yenile
    const refresh = localStorage.getItem('hns_refresh');
    if(refresh){
      sb.auth.setSession({ access_token: localStorage.getItem('hns_token')||'', refresh_token: refresh })
        .then(({ data }) => {
          if(data.session){
            localStorage.setItem('hns_token', data.session.access_token);
            localStorage.setItem('hns_refresh', data.session.refresh_token);
            // Kullanıcı emailini header'a yaz
            window._hnsUserEmail = data.session.user.email;
          }
          if(!S.t2vMdl)S.t2vMdl="kling25t";
          initApp();
        })
        .catch(() => { if(!S.t2vMdl)S.t2vMdl="kling25t"; initApp(); });
    } else {
      if(!S.t2vMdl)S.t2vMdl="kling25t";
      initApp();
    }

    // Çıkış fonksiyonu — render'dan çağrılır
    window.doLogout = async function(){
      await sb.auth.signOut();
      localStorage.removeItem('hns_token');
      localStorage.removeItem('hns_refresh');
      window.location.href = '/login.html';
    };
  })();
</script>
